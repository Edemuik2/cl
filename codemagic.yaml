workflows:
  ios-build:
    name: iOS Sideload Build
    max_build_duration: 60
    environment:
      xcode: latest
    scripts:
      - name: Unzip and Link Model
        script: |
          unzip -o LaMa.mlpackage.zip -d .
          gem install xcodeproj
          ruby -e '
            require "xcodeproj"
            project_path = "lama-cleaner-ios.xcodeproj"
            project = Xcodeproj::Project.open(project_path)
            target = project.targets.first
            file_ref = project.main_group.new_file("LaMa.mlpackage")
            unless target.resources_build_phase.files.any? { |f| f.file_ref && f.file_ref.path == "LaMa.mlpackage" }
              target.resources_build_phase.add_file_reference(file_ref)
              project.save
              puts "Модель успешно интегрирована в структуру Xcode!"
            else
              puts "Модель уже была добавлена ранее."
            end
          '
      - name: Build Unsigned IPA
        script: |
          xcodebuild build \
            -project lama-cleaner-ios.xcodeproj \
            -scheme lama-cleaner-ios \
            -configuration Release \
            -sdk iphoneos \
            SYMROOT=$PWD/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            clean build
            
          # Формируем структуру .ipa динамически по расширению *.app
          mkdir -p Payload
          mv build/Release-iphoneos/*.app Payload/
          zip -r lama-cleaner-ios.ipa Payload
          
    artifacts:
      - lama-cleaner-ios.ipa
